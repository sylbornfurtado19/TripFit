<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password • TripFit</title>
    <link rel="icon" href="logo/TripFit_logo2-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mint: '#2dd4bf',
                        juniper: '#0f373b',
                        pearl: '#f8f9fa',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-10 border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-mint/10 text-mint rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-juniper tracking-tight">Set new password</h2>
            <p id="reset-subtitle" class="text-gray-500 mt-3 text-sm leading-relaxed">Choose a strong password for your TripFit account.</p>
        </div>

        <form id="reset-form" class="space-y-5">
            <div>
                <label for="new-password" class="block text-sm font-semibold text-juniper mb-2">New Password</label>
                <input id="new-password" type="password" class="w-full h-12 px-4 text-base text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="At least 8 characters" required>
            </div>

            <div>
                <label for="confirm-password" class="block text-sm font-semibold text-juniper mb-2">Confirm Password</label>
                <input id="confirm-password" type="password" class="w-full h-12 px-4 text-base text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="Retype your new password" required>
            </div>

            <p id="reset-msg" class="text-sm text-gray-500 text-center">Your password will be updated instantly.</p>

            <button type="submit" class="w-full py-4 bg-juniper hover:bg-gray-800 text-white font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95">
                Update Password
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-juniper transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to login
            </a>
        </div>
    </div>

    <script>
        function safeParseJSON(value, fallback) {
            try {
                return value ? JSON.parse(value) : fallback;
            } catch {
                return fallback;
            }
        }

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function getStoredUsers() {
            const tripfitUsers = safeParseJSON(localStorage.getItem('tripfitUsers'), null);
            if (Array.isArray(tripfitUsers)) {
                return tripfitUsers;
            }
            const hiksterUsers = safeParseJSON(localStorage.getItem('hiksterUsers'), []);
            return Array.isArray(hiksterUsers) ? hiksterUsers : [];
        }

        function setMessage(text, isError) {
            const msg = document.getElementById('reset-msg');
            msg.textContent = text;
            msg.classList.toggle('text-red-500', !!isError);
            msg.classList.toggle('text-gray-500', !isError);
        }

        const params = new URLSearchParams(window.location.search);
        const email = normalizeEmail(params.get('email') || '');
        const resetSession = safeParseJSON(localStorage.getItem('tripfitResetSession'), null);
        const validResetSession = Boolean(
            resetSession
            && normalizeEmail(resetSession.email) === email
            && Number(resetSession.expiresAt) > Date.now()
        );

        if (!email) {
            window.location.href = 'index.html';
        } else if (!validResetSession) {
            localStorage.removeItem('tripfitResetSession');
            window.location.href = `verify.html?mode=reset&email=${encodeURIComponent(email)}`;
        }

        document.getElementById('reset-subtitle').textContent = `Updating password for ${email}`;

        document.getElementById('reset-form').addEventListener('submit', (event) => {
            event.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword.length < 8) {
                setMessage('Password must be at least 8 characters.', true);
                return;
            }

            if (newPassword !== confirmPassword) {
                setMessage('Passwords do not match.', true);
                return;
            }

            const users = getStoredUsers();
            const userIndex = users.findIndex((user) => normalizeEmail(user.email) === email);

            if (userIndex === -1) {
                setMessage('No account found for this email.', true);
                return;
            }

            users[userIndex] = {
                ...users[userIndex],
                password: newPassword
            };

            localStorage.setItem('tripfitUsers', JSON.stringify(users));
            localStorage.setItem('hiksterUsers', JSON.stringify(users));
            localStorage.removeItem('tripfitResetSession');

            alert('Password updated successfully. Please login with your new password.');
            window.location.href = `index.html?email=${encodeURIComponent(email)}`;
        });
    </script>
</body>
</html>
