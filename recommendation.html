<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Matches • TripFit</title>
    
    <link rel="icon" href="logo/TripFit_logo2-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="itinerary-modal.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        mint: '#2dd4bf',
                        teal: '#14b8a6',
                        juniper: '#0f373b',
                        pearl: '#f8f9fa',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>

    <script src="navbar.js" defer></script>
</head>
<body class="bg-pearl dark:bg-gray-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <header id="tripfit-navbar"></header>

    <!-- Hero Section -->
    <section class="bg-white dark:bg-gray-800 py-16 px-6 text-center border-b border-gray-200 dark:border-gray-700 transition-colors">
        <div class="max-w-3xl mx-auto">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-mint/20 text-mint rounded-full mb-6 text-3xl">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-juniper dark:text-white tracking-tight mb-4">Your perfect matches</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">Based on your unique vibe, we have calculated the top destinations for your next escape.</p>
        </div>
    </section>

    <!-- Main Results Section -->
    <section class="py-16 px-6 flex-1">
        <div class="max-w-7xl mx-auto">
            
            <!-- Loading State -->
            <div id="analyzing-loading" class="text-center py-16">
                <div class="inline-block animate-spin text-5xl text-mint mb-6">⟳</div>
                <p class="text-2xl font-bold text-juniper">Analyzing your travel profile...</p>
                <p class="text-gray-500 mt-2">Finding your perfect matches</p>
            </div>

            <!-- Results Grid (cards will be injected here) -->
            <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-8">
                <!-- Populated by script.js -->
            </div>

            <div class="mt-16 text-center">
                <p class="text-gray-500 dark:text-gray-400 mb-6">Want to explore more options?</p>
                <a href="all-destinations.html" 
                   class="inline-block px-8 py-4 border-2 border-juniper dark:border-mint text-juniper dark:text-mint hover:bg-juniper dark:hover:bg-mint hover:text-white dark:hover:text-juniper font-bold rounded-xl transition-all">
                    View entire catalog
                </a>
            </div>
        </div>
    </section>

    <script src="itinerary-modal.js"></script>
    <script src="script.js"></script>

    <script>
        // Render recommendations immediately
        if (typeof renderRecommendationResults === 'function') {
            renderRecommendationResults();
        }

        // Also save to history
        if (typeof trySaveRecommendationSnapshot === 'function') {
            trySaveRecommendationSnapshot();
        }
    </script>
</body>
</html>
