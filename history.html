<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History • TripFit</title>

    <link rel="icon" href="logo/TripFit_logo2-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="itinerary-modal.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        mint: '#2dd4bf',
                        teal: '#14b8a6',
                        juniper: '#0f373b',
                        pearl: '#f8f9fa'
                    }
                }
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(circle at 16% 18%, rgba(45, 212, 191, 0.16), transparent 30%),
                radial-gradient(circle at 84% 75%, rgba(20, 184, 166, 0.14), transparent 30%),
                #f8f9fa;
        }

        html.dark body {
            background:
                radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.08), transparent 35%),
                radial-gradient(circle at 83% 78%, rgba(13, 95, 102, 0.2), transparent 35%),
                #0b1117;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800 dark:text-gray-100">
    <header id="tripfit-navbar"></header>

    <section class="pt-28 pb-12 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="rounded-3xl border border-white/60 dark:border-mint/20 shadow-2xl overflow-hidden">
                <div class="bg-gradient-to-r from-juniper via-teal to-juniper px-8 py-11 md:px-12 text-white">
                    <p class="uppercase tracking-[0.2em] text-xs text-mint font-bold">Journey Timeline</p>
                    <h1 class="text-4xl md:text-5xl font-extrabold mt-3">Travel History</h1>
                    <p class="text-teal-100 mt-4 max-w-2xl">Review your earlier recommendations, compare preference snapshots, and pick up where you left off.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="px-6 pb-16 flex-1">
        <div id="history-container" class="max-w-6xl mx-auto space-y-8"></div>

        <div id="history-actions" class="text-center mt-10 hidden">
            <button onclick="clearHistory()" class="px-7 py-3 bg-red-500 text-white rounded-full font-bold hover:bg-red-600 transition-colors shadow-lg">
                Clear History
            </button>
        </div>
    </section>

    <footer class="bg-juniper text-center py-8 border-t border-teal/20 mt-auto">
        <p class="text-gray-400 text-sm">&copy; 2026 TripFit • Fueling wanderlust for dreamers and explorers worldwide.</p>
    </footer>

    <script src="itinerary-modal.js"></script>
    <script src="script.js"></script>
    <script src="navbar.js"></script>
    <script>
        function parseStoredList(key) {
            try {
                const parsed = JSON.parse(localStorage.getItem(key) || '[]');
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function escapeHTML(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const history = parseStoredList('tripfitHistory');
        const bookings = parseStoredList('tripfitBookings');
        const container = document.getElementById('history-container');
        const actions = document.getElementById('history-actions');

        if (history.length === 0 && bookings.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 px-8 rounded-2xl bg-white/85 dark:bg-gray-800/85 border border-gray-200 dark:border-gray-700 shadow-lg">
                    <div class="h-16 w-16 mx-auto rounded-full bg-mint/20 text-mint flex items-center justify-center text-2xl mb-4">
                        <i class="fas fa-clock-rotate-left"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-3 text-juniper dark:text-white">No History Found</h2>
                    <p class="text-gray-600 dark:text-gray-300 mb-7">Take the quiz and generate your first personalized recommendation set.</p>
                    <a href="quiz.html" class="inline-flex items-center gap-2 px-7 py-3 bg-juniper hover:bg-teal text-white rounded-full font-bold transition-colors">
                        Take Quiz <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            `;
        } else {
            actions.classList.remove('hidden');

            if (bookings.length > 0) {
                const bookingRows = bookings.slice().reverse().map(item => {
                    const tripName = item.destinationName || item.destName || item.trekName || item.name || 'Trip Destination';
                    const tripRegion = item.region || item.country || 'Region unavailable';
                    const travellers = Number(item.travellers || item.travelers || item.guests || 1);
                    const amount = Number(item.amount || item.total || item.price || 0);
                    const reference = item.reference || item.bookingId || item.id || 'TF-NA';
                    const date = item.date || 'Recent';

                    return `
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 p-4 rounded-xl bg-gray-50 dark:bg-gray-900/60 border border-gray-200 dark:border-gray-700">
                            <div>
                                <p class="font-semibold text-juniper dark:text-mint">${escapeHTML(tripName)}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(tripRegion)} · ${travellers} traveler${travellers > 1 ? 's' : ''}</p>
                            </div>
                            <div class="text-left md:text-right">
                                <p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(date)}</p>
                                <p class="font-bold text-juniper dark:text-mint">INR ${amount.toLocaleString('en-IN')}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">Ref: ${escapeHTML(reference)}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML += `
                    <article class="bg-white/90 dark:bg-gray-800/90 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl p-6 md:p-7">
                        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
                            <p class="text-sm text-gray-500 dark:text-gray-400">Latest checkout activity</p>
                            <span class="text-xs uppercase tracking-wider font-semibold text-mint bg-mint/10 px-3 py-1 rounded-full">Bookings</span>
                        </div>
                        <div class="space-y-3">${bookingRows}</div>
                    </article>
                `;
            }

            history.forEach(item => {
                const results = Array.isArray(item.results) ? item.results : [];
                const cards = results.map(dest => buildCardHTML(dest, false)).join('');
                const prefs = item.preferences || {};

                container.innerHTML += `
                    <article class="bg-white/90 dark:bg-gray-800/90 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl p-6 md:p-7">
                        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
                            <p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(item.date || 'Recent')}</p>
                            <span class="text-xs uppercase tracking-wider font-semibold text-mint bg-mint/10 px-3 py-1 rounded-full">Recommendation Snapshot</span>
                        </div>

                        <div class="flex flex-wrap gap-2 mb-6">
                            <span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.climate || prefs.terrain || 'Any climate')}</span>
                            <span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.trip || prefs.difficulty || 'Any trip style')}</span>
                            <span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.budget || 'Any budget')}</span>
                            <span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.activities || prefs.altitude || 'Any activity')}</span>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${cards || '<p class="text-gray-500 dark:text-gray-400">No recommendations saved in this snapshot.</p>'}
                        </div>
                    </article>
                `;
            });
        }

        function clearHistory() {
            localStorage.removeItem('tripfitHistory');
            localStorage.removeItem('tripfitBookings');
            localStorage.removeItem('hiksterHistory');
            localStorage.removeItem('hiksterBookings');
            location.reload();
        }
    </script>
</body>
</html>
