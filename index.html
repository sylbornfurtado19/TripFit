<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • TripFit</title>
    
    <link rel="icon" href="logo/TripFit_logo2-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        mint: '#2dd4bf',
                        juniper: '#0f373b',
                        pearl: '#f8f9fa',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-image: linear-gradient(rgba(15, 55, 59, 0.3), rgba(15, 55, 59, 0.3)), url('images/swiss.png');
            background-size: cover;
            background-position: center;
            transition: background-image 0.3s ease;
        }

        body.dark {
            background-image: linear-gradient(rgba(15, 55, 59, 0.8), rgba(15, 55, 59, 0.8)), url('images/swiss.png');
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-10 transform transition-all hover:scale-105 duration-500 border border-gray-100 dark:border-gray-700 relative">

        <button id="theme-toggle" class="absolute top-6 right-6 p-2 rounded-full text-gray-400 hover:text-juniper dark:hover:text-mint transition-colors" type="button" aria-label="Toggle theme">
            <i class="fas fa-moon text-xl" id="theme-icon"></i>
        </button>

        <div class="text-center mb-8 mt-16 relative">
            <img src="logo/TripFit_logo2-removebg-preview.png" alt="TripFit Logo" class="h-28 object-contain absolute left-1/2 -translate-x-1/2 -top-24">

            <h2 class="text-3xl font-extrabold text-juniper dark:text-white tracking-tight mt-24">Welcome Back</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in to plan your next adventure.</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input id="login-email" type="email" required class="block w-full pl-11 pr-4 py-3 bg-transparent border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm dark:text-white focus:border-mint dark:focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="explorer@tripfit.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input id="login-pass" type="password" required class="block w-full pl-11 pr-11 py-3 bg-transparent border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm dark:text-white focus:border-mint dark:focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="••••••••">
                    <button type="button" onclick="toggleLoginPassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" aria-label="Toggle password visibility">
                        <i id="login-pass-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" class="rounded border-gray-300 dark:border-gray-600 dark:bg-gray-700 text-mint focus:ring-mint h-4 w-4 cursor-pointer">
                    <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                </label>
                <a id="forgot-password-link" href="verify.html" class="text-sm font-bold text-mint hover:text-juniper dark:hover:text-white transition-colors">Forgot password?</a>
            </div>

            <button type="submit" class="w-full py-4 bg-juniper dark:bg-mint hover:bg-gray-800 dark:hover:bg-teal text-white dark:text-juniper font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95 flex justify-center items-center gap-2">
                Sign In <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-8">
            Don't have an account? <a href="signup.html" class="font-bold text-mint hover:underline">Sign up for free</a>
        </p>
    </div>

    <script>
        function applyBodyTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            document.body.classList.toggle('dark', isDark);
        }

        function toggleLoginPassword() {
            const field = document.getElementById('login-pass');
            const icon = document.getElementById('login-pass-icon');

            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function safeParseJSON(value, fallback) {
            try {
                return value ? JSON.parse(value) : fallback;
            } catch {
                return fallback;
            }
        }

        function getStoredUsers() {
            const tripfitUsers = safeParseJSON(localStorage.getItem('tripfitUsers'), null);
            if (Array.isArray(tripfitUsers)) {
                return tripfitUsers;
            }

            const hiksterUsers = safeParseJSON(localStorage.getItem('hiksterUsers'), []);
            return Array.isArray(hiksterUsers) ? hiksterUsers : [];
        }

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
        }

        function isDisposableDomain(email) {
            const domain = email.split('@')[1] || '';
            const blocked = [
                'mailinator.com', 'tempmail.com', '10minutemail.com', 'guerrillamail.com',
                'yopmail.com', 'sharklasers.com', 'trashmail.com', 'getnada.com'
            ];
            return blocked.includes(domain);
        }

        function getPostLoginRedirect() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            return redirect ? decodeURIComponent(redirect) : 'home.html';
        }

        function handleLogin(e) {
            e.preventDefault();

            const email = normalizeEmail(document.getElementById('login-email').value);
            const password = document.getElementById('login-pass').value;

            if (!isValidEmail(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            if (isDisposableDomain(email)) {
                alert('Disposable email addresses are not allowed. Please use your real email.');
                return;
            }

            const users = getStoredUsers();
            const matchedUser = users.find((user) => normalizeEmail(user.email) === email && user.password === password);

            if (!matchedUser) {
                alert('Invalid email or password.');
                return;
            }

            const activeUser = { name: matchedUser.name || 'Traveler', email: matchedUser.email };

            localStorage.setItem('tripfitUser', JSON.stringify(activeUser));
            localStorage.setItem('hiksterUser', JSON.stringify(activeUser));
            window.location.href = getPostLoginRedirect();
        }

        const forgotPasswordLink = document.getElementById('forgot-password-link');
        if (forgotPasswordLink) {
            forgotPasswordLink.addEventListener('click', (event) => {
                event.preventDefault();

                const email = normalizeEmail(document.getElementById('login-email').value);
                if (!isValidEmail(email)) {
                    alert('Enter a valid email first, then click Forgot password.');
                    return;
                }

                if (isDisposableDomain(email)) {
                    alert('Disposable email addresses are not allowed. Please use your real email.');
                    return;
                }

                const users = getStoredUsers();
                const exists = users.some((user) => normalizeEmail(user.email) === email);
                if (!exists) {
                    alert('This email is not registered. Please sign up first.');
                    return;
                }

                window.location.href = `verify.html?email=${encodeURIComponent(email)}&mode=reset`;
            });
        }

        const paramsForPrefill = new URLSearchParams(window.location.search);
        const prefillEmail = normalizeEmail(paramsForPrefill.get('email') || '');
        if (prefillEmail && isValidEmail(prefillEmail)) {
            const loginEmailInput = document.getElementById('login-email');
            if (loginEmailInput) {
                loginEmailInput.value = prefillEmail;
            }
        }

        // Theme Toggle Logic with Memory
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Check memory on load
        if (localStorage.getItem('tripfit-theme') === 'dark') {
            document.documentElement.classList.add('dark');
            applyBodyTheme();
            if (themeIcon) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        }

        // Handle toggle click
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                applyBodyTheme();
                
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.setItem('tripfit-theme', 'dark');
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                } else {
                    localStorage.setItem('tripfit-theme', 'light');
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                }
            });
        }
    </script>
</body>
</html>
